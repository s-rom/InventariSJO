<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventari API Tester</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #111; color: #eee; font-size: 14px; }
    h2 { font-size: 16px; margin-bottom: 8px; color: #7cf; }
    h3 { font-size: 13px; margin: 12px 0 6px; color: #aaa; text-transform: uppercase; }
    input, textarea, select {
      background: #222; border: 1px solid #444; color: #eee; padding: 5px 8px;
      border-radius: 3px; font-family: monospace; font-size: 13px; width: 100%;
    }
    input:focus, textarea:focus, select:focus { outline: 1px solid #7cf; }
    button {
      background: #1a3a5c; border: 1px solid #2a5a8c; color: #7cf;
      padding: 5px 12px; cursor: pointer; border-radius: 3px; font-family: monospace;
      font-size: 13px; margin-right: 6px; margin-top: 4px;
    }
    button:hover { background: #2a5a8c; }
    button.danger { background: #4a1a1a; border-color: #8c2a2a; color: #f77; }
    button.danger:hover { background: #6a2a2a; }
    button.success { background: #1a4a1a; border-color: #2a8c2a; color: #7f7; }
    button.success:hover { background: #2a6a2a; }
    .layout { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 170px; min-width: 170px; background: #1a1a1a; border-right: 1px solid #333;
      display: flex; flex-direction: column;
    }
    .sidebar-title { padding: 14px 12px; font-size: 15px; color: #7cf; border-bottom: 1px solid #333; font-weight: bold; }
    .tab {
      padding: 10px 14px; cursor: pointer; border-left: 3px solid transparent; color: #aaa;
    }
    .tab:hover { background: #222; color: #eee; }
    .tab.active { border-left-color: #7cf; background: #222; color: #7cf; }
    .content { flex: 1; overflow-y: auto; padding: 20px; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 14px; margin-bottom: 14px; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .row label { min-width: 140px; color: #888; font-size: 12px; }
    .response {
      background: #0d1a0d; border: 1px solid #2a4a2a; border-radius: 3px;
      padding: 10px; margin-top: 10px; white-space: pre-wrap; word-break: break-all;
      font-size: 12px; max-height: 300px; overflow-y: auto; color: #7f7;
    }
    .response.error { background: #1a0d0d; border-color: #4a2a2a; color: #f77; }
    .token-bar {
      background: #1a1a1a; border-bottom: 1px solid #333; padding: 8px 14px;
      font-size: 12px; color: #666; display: flex; align-items: center; gap: 10px;
    }
    .token-val { color: #7cf; max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; padding: 6px 8px; background: #222; color: #888; }
    td { padding: 5px 8px; border-bottom: 1px solid #222; }
    tr:hover td { background: #1e1e1e; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
const API_BASE = 'http://localhost:8080';

// ── HTTP helpers ──────────────────────────────────────────────────────────────
const req = async (method, path, body, token) => {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(`${API_BASE}${path}`, {
    method, headers,
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  if (res.status === 204) return { _status: 204, message: 'No Content (success)' };
  const data = await res.json().catch(() => ({ _raw: res.statusText }));
  return { _status: res.status, ...data };
};
const get    = (path, token)       => req('GET',    path, undefined, token);
const post   = (path, body, token) => req('POST',   path, body,      token);
const patch  = (path, body, token) => req('PATCH',  path, body,      token);
const del    = (path, token)       => req('DELETE', path, undefined, token);

// ── Shared components ─────────────────────────────────────────────────────────
const Res = ({ data }) => {
  if (!data) return null;
  const isErr = data.error || (data._status && data._status >= 400);
  return <pre className={`response${isErr ? ' error' : ''}`}>{JSON.stringify(data, null, 2)}</pre>;
};

const Field = ({ label, value, onChange, type = 'text', placeholder = '' }) => (
  <div className="row">
    <label>{label}</label>
    <input type={type} value={value} placeholder={placeholder} onChange={e => onChange(e.target.value)} />
  </div>
);

const JsonField = ({ label, value, onChange }) => (
  <div className="row" style={{ alignItems: 'flex-start' }}>
    <label style={{ paddingTop: 5 }}>{label} (JSON)</label>
    <textarea rows={2} value={value} onChange={e => onChange(e.target.value)} style={{ fontFamily: 'monospace', resize: 'vertical' }} />
  </div>
);

// ── AUTH ──────────────────────────────────────────────────────────────────────
const AuthSection = ({ token, onToken }) => {
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [res, setRes] = useState(null);

  const [regUser, setRegUser] = useState('');
  const [regPass, setRegPass] = useState('');
  const [regCanCreate, setRegCanCreate] = useState(false);
  const [regCanUpdate, setRegCanUpdate] = useState(false);
  const [regCanDelete, setRegCanDelete] = useState(false);
  const [regIsMeta,    setRegIsMeta]    = useState(false);
  const [regRes, setRegRes] = useState(null);

  const login = async () => {
    const data = await post('/auth/login', { username: user, password: pass });
    setRes(data);
    if (data.token) onToken(data.token);
  };
  const logout = async () => {
    const data = await post('/auth/logout', {}, token);
    setRes(data);
    onToken('');
  };
  const register = async () => {
    const data = await post('/users', {
      username:   regUser,
      password:   regPass,
      can_create: regCanCreate,
      can_update: regCanUpdate,
      can_delete: regCanDelete,
      is_meta:    regIsMeta,
    }, token);
    setRegRes(data);
  };

  const CheckField = ({ label, checked, onChange }) => (
    <div className="row" style={{ alignItems: 'center' }}>
      <label>{label}</label>
      <input type="checkbox" checked={checked} onChange={e => onChange(e.target.checked)}
        style={{ width: 'auto', cursor: 'pointer' }} />
    </div>
  );

  return (
    <div>
      <h2>Auth</h2>
      <div className="grid">
        <div className="card">
          <h3>POST /auth/login</h3>
          <Field label="username" value={user} onChange={setUser} />
          <Field label="password" value={pass} onChange={setPass} type="password" />
          <button className="success" onClick={login}>Login</button>
          <Res data={res} />
        </div>
        <div className="card">
          <h3>POST /auth/logout</h3>
          <p style={{ color: '#666', fontSize: 12, marginBottom: 8 }}>Uses stored token</p>
          <button className="danger" onClick={logout}>Logout</button>
        </div>
      </div>

      <div className="card" style={{ marginTop: 14 }}>
        <h3>POST /users — Register new user</h3>
        <p style={{ color: '#666', fontSize: 11, marginBottom: 10 }}>Requires a logged-in meta user token</p>
        <div className="grid">
          <div>
            <Field label="username" value={regUser} onChange={setRegUser} />
            <Field label="password" value={regPass} onChange={setRegPass} type="password" />
          </div>
          <div>
            <CheckField label="can_create" checked={regCanCreate} onChange={setRegCanCreate} />
            <CheckField label="can_update" checked={regCanUpdate} onChange={setRegCanUpdate} />
            <CheckField label="can_delete" checked={regCanDelete} onChange={setRegCanDelete} />
            <CheckField label="is_meta"    checked={regIsMeta}    onChange={setRegIsMeta} />
          </div>
        </div>
        <button className="success" onClick={register}>Register</button>
        <Res data={regRes} />
      </div>
    </div>
  );
};

// ── Generic CRUD section ──────────────────────────────────────────────────────
const CrudSection = ({ title, basePath, token, fields, createFields, updateFields, idField = 'id' }) => {
  const [listRes,   setListRes]   = useState(null);
  const [createVals, setCreateVals] = useState({});
  const [createRes, setCreateRes] = useState(null);
  const [updateId, setUpdateId]   = useState('');
  const [updateVals, setUpdateVals] = useState({});
  const [updateRes, setUpdateRes] = useState(null);
  const [deleteId, setDeleteId]   = useState('');
  const [deleteRes, setDeleteRes] = useState(null);

  const setCreate = k => v => setCreateVals(p => ({ ...p, [k]: v }));
  const setUpdate = k => v => setUpdateVals(p => ({ ...p, [k]: v }));

  const parseVal = v => {
    if (v === '' || v === undefined) return undefined;
    if (v === 'true') return true;
    if (v === 'false') return false;
    const n = Number(v);
    if (!isNaN(n) && v !== '') return n;
    try { return JSON.parse(v); } catch { return v; }
  };

  const buildBody = vals =>
    Object.fromEntries(Object.entries(vals).filter(([, v]) => v !== '').map(([k, v]) => [k, parseVal(v)]));

  return (
    <div>
      <h2>{title}</h2>

      {/* LIST */}
      <div className="card">
        <h3>GET {basePath}</h3>
        <button onClick={async () => setListRes(await get(basePath, token))}>Fetch</button>
        <Res data={listRes} />
      </div>

      <div className="grid">
        {/* CREATE */}
        <div className="card">
          <h3>POST {basePath}</h3>
          {(createFields || fields).map(f => (
            <Field key={f.key} label={f.key} value={createVals[f.key] || ''} onChange={setCreate(f.key)} placeholder={f.placeholder || ''} />
          ))}
          <button className="success" onClick={async () => setCreateRes(await post(basePath, buildBody(createVals), token))}>Create</button>
          <Res data={createRes} />
        </div>

        {/* UPDATE */}
        <div className="card">
          <h3>PATCH {basePath}/:id</h3>
          <Field label="id" value={updateId} onChange={setUpdateId} placeholder="numeric id" />
          {(updateFields || fields).map(f => (
            <Field key={f.key} label={f.key} value={updateVals[f.key] || ''} onChange={setUpdate(f.key)} placeholder={f.placeholder || 'leave blank to skip'} />
          ))}
          <button onClick={async () => setUpdateRes(await patch(`${basePath}/${updateId}`, buildBody(updateVals), token))}>Update</button>
          <Res data={updateRes} />
        </div>
      </div>

      {/* DELETE */}
      <div className="card">
        <h3>DELETE {basePath}/:id</h3>
        <div className="row">
          <label>id</label>
          <input value={deleteId} onChange={e => setDeleteId(e.target.value)} placeholder="numeric id" />
        </div>
        <button className="danger" onClick={async () => setDeleteRes(await del(`${basePath}/${deleteId}`, token))}>Delete</button>
        <Res data={deleteRes} />
      </div>
    </div>
  );
};

// ── USERS (extra: has can_create / flags) ─────────────────────────────────────
const UsersSection = ({ token }) => {
  const fields = [
    { key: 'username' },
    { key: 'password', placeholder: '(required for create)' },
    { key: 'can_create', placeholder: 'true / false' },
    { key: 'can_update', placeholder: 'true / false' },
    { key: 'can_delete', placeholder: 'true / false' },
    { key: 'is_meta',    placeholder: 'true / false' },
  ];
  const updateFields = fields.filter(f => f.key !== 'password');
  return <CrudSection title="Users" basePath="/users" token={token} fields={fields} updateFields={updateFields} />;
};

// ── ROOMS (nested under center) ───────────────────────────────────────────────
const RoomsSection = ({ token }) => {
  const [centerId, setCenterId] = useState('');
  const [name, setName]         = useState('');
  const [listRes, setListRes]   = useState(null);
  const [createRes, setCreateRes] = useState(null);
  const [updateId, setUpdateId] = useState('');
  const [updateName, setUpdateName] = useState('');
  const [updateRes, setUpdateRes] = useState(null);
  const [deleteId, setDeleteId] = useState('');
  const [deleteRes, setDeleteRes] = useState(null);

  return (
    <div>
      <h2>Rooms</h2>
      <div className="card">
        <h3>GET /centers/:centerId/rooms</h3>
        <Field label="centerId" value={centerId} onChange={setCenterId} placeholder="center id" />
        <button onClick={async () => setListRes(await get(`/centers/${centerId}/rooms`, token))}>Fetch</button>
        <Res data={listRes} />
      </div>
      <div className="grid">
        <div className="card">
          <h3>POST /centers/:centerId/rooms</h3>
          <Field label="centerId" value={centerId} onChange={setCenterId} placeholder="center id" />
          <Field label="name" value={name} onChange={setName} />
          <button className="success" onClick={async () => setCreateRes(await post(`/centers/${centerId}/rooms`, { name }, token))}>Create</button>
          <Res data={createRes} />
        </div>
        <div className="card">
          <h3>PATCH /rooms/:id</h3>
          <Field label="id" value={updateId} onChange={setUpdateId} placeholder="room id" />
          <Field label="name" value={updateName} onChange={setUpdateName} />
          <button onClick={async () => setUpdateRes(await patch(`/rooms/${updateId}`, { name: updateName }, token))}>Update</button>
          <Res data={updateRes} />
        </div>
      </div>
      <div className="card">
        <h3>DELETE /rooms/:id</h3>
        <Field label="id" value={deleteId} onChange={setDeleteId} placeholder="room id" />
        <button className="danger" onClick={async () => setDeleteRes(await del(`/rooms/${deleteId}`, token))}>Delete</button>
        <Res data={deleteRes} />
      </div>
    </div>
  );
};

// ── COMPUTERS ─────────────────────────────────────────────────────────────────
const ComputersSection = ({ token }) => {
  const [listRes,   setListRes]   = useState(null);
  const [getId,     setGetId]     = useState('');
  const [getRes,    setGetRes]    = useState(null);
  const [auditId,   setAuditId]   = useState('');
  const [auditRes,  setAuditRes]  = useState(null);
  const [deleteId,  setDeleteId]  = useState('');
  const [deleteRes, setDeleteRes] = useState(null);

  const [createVals, setCreateVals] = useState({
    hostname: '', computer_type: 'desktop', ram_gb: '', storage_gb: '',
    storage_type: 'SSD', cpu_id: '', ram_type: '', equipment_user_id: '',
    room_id: '', mac_address: '', observations: '', os_ids: '',
  });
  const [createRes, setCreateRes] = useState(null);

  const [updateId, setUpdateId]   = useState('');
  const [updateVals, setUpdateVals] = useState({});
  const [updateRes, setUpdateRes] = useState(null);

  const setC = k => v => setCreateVals(p => ({ ...p, [k]: v }));
  const setU = k => v => setUpdateVals(p => ({ ...p, [k]: v }));

  const buildCreate = () => {
    const body = {
      hostname:      createVals.hostname,
      computer_type: createVals.computer_type,
      ram_gb:        Number(createVals.ram_gb),
      storage_gb:    Number(createVals.storage_gb),
      storage_type:  createVals.storage_type || 'SSD',
    };
    if (createVals.cpu_id)           body.cpu_id           = Number(createVals.cpu_id);
    if (createVals.ram_type)         body.ram_type         = createVals.ram_type;
    if (createVals.equipment_user_id) body.equipment_user_id = Number(createVals.equipment_user_id);
    if (createVals.room_id)          body.room_id          = Number(createVals.room_id);
    if (createVals.mac_address)      body.mac_address      = createVals.mac_address;
    if (createVals.observations)     body.observations     = createVals.observations;
    if (createVals.os_ids)           body.os_ids           = createVals.os_ids.split(',').map(Number).filter(Boolean);
    return body;
  };

  const buildUpdate = () => {
    const body = {};
    const v = updateVals;
    if (v.hostname)          body.hostname           = v.hostname;
    if (v.cpu_id)            body.cpu_id             = Number(v.cpu_id);
    if (v.ram_gb)            body.ram_gb             = Number(v.ram_gb);
    if (v.ram_type)          body.ram_type           = v.ram_type;
    if (v.storage_gb)        body.storage_gb         = Number(v.storage_gb);
    if (v.storage_type)      body.storage_type       = v.storage_type;
    if (v.computer_type)     body.computer_type      = v.computer_type;
    if (v.observations)      body.observations       = v.observations;
    if (v.equipment_user_id) body.equipment_user_id  = Number(v.equipment_user_id);
    if (v.room_id)           body.room_id            = Number(v.room_id);
    if (v.mac_address)       body.mac_address        = v.mac_address;
    return body;
  };

  const enumOpts = (opts) => (
    <select onChange={e => {}} style={{ width: 'auto', minWidth: 120 }}>
      {opts.map(o => <option key={o}>{o}</option>)}
    </select>
  );

  return (
    <div>
      <h2>Computers</h2>

      {/* LIST */}
      <div className="card">
        <h3>GET /computers</h3>
        <button onClick={async () => setListRes(await get('/computers', token))}>Fetch all</button>
        <Res data={listRes} />
      </div>

      <div className="grid">
        {/* GET ONE */}
        <div className="card">
          <h3>GET /computers/:id</h3>
          <Field label="id" value={getId} onChange={setGetId} />
          <button onClick={async () => setGetRes(await get(`/computers/${getId}`, token))}>Fetch</button>
          <Res data={getRes} />
        </div>
        {/* AUDIT */}
        <div className="card">
          <h3>GET /computers/:id/audit</h3>
          <Field label="id" value={auditId} onChange={setAuditId} />
          <button onClick={async () => setAuditRes(await get(`/computers/${auditId}/audit`, token))}>Fetch audit</button>
          <Res data={auditRes} />
        </div>
      </div>

      {/* CREATE */}
      <div className="card">
        <h3>POST /computers</h3>
        <div className="grid">
          <div>
            <Field label="hostname *"        value={createVals.hostname}      onChange={setC('hostname')} />
            <div className="row">
              <label>computer_type *</label>
              <select value={createVals.computer_type} onChange={e => setC('computer_type')(e.target.value)}>
                <option>desktop</option><option>laptop</option>
              </select>
            </div>
            <Field label="ram_gb *"          value={createVals.ram_gb}        onChange={setC('ram_gb')} placeholder="e.g. 8" />
            <div className="row">
              <label>ram_type</label>
              <select value={createVals.ram_type} onChange={e => setC('ram_type')(e.target.value)}>
                <option value="">— none —</option>
                <option>DDR3</option><option>DDR4</option><option>DDR5</option>
              </select>
            </div>
            <Field label="storage_gb *"      value={createVals.storage_gb}    onChange={setC('storage_gb')} placeholder="e.g. 256" />
            <div className="row">
              <label>storage_type</label>
              <select value={createVals.storage_type} onChange={e => setC('storage_type')(e.target.value)}>
                <option>SSD</option><option>HDD</option><option>NVMe</option><option>None</option>
              </select>
            </div>
          </div>
          <div>
            <Field label="cpu_id"            value={createVals.cpu_id}        onChange={setC('cpu_id')} placeholder="optional" />
            <Field label="equipment_user_id" value={createVals.equipment_user_id} onChange={setC('equipment_user_id')} placeholder="optional" />
            <Field label="room_id"           value={createVals.room_id}       onChange={setC('room_id')} placeholder="optional" />
            <Field label="mac_address"       value={createVals.mac_address}   onChange={setC('mac_address')} placeholder="optional" />
            <Field label="observations"      value={createVals.observations}  onChange={setC('observations')} placeholder="optional" />
            <Field label="os_ids"            value={createVals.os_ids}        onChange={setC('os_ids')} placeholder="1,2,3 (comma separated)" />
          </div>
        </div>
        <button className="success" onClick={async () => setCreateRes(await post('/computers', buildCreate(), token))}>Create</button>
        <Res data={createRes} />
      </div>

      {/* UPDATE */}
      <div className="card">
        <h3>PATCH /computers/:id</h3>
        <Field label="id *" value={updateId} onChange={setUpdateId} />
        <div className="grid">
          <div>
            <Field label="hostname"          value={updateVals.hostname      || ''} onChange={setU('hostname')} />
            <Field label="cpu_id"            value={updateVals.cpu_id        || ''} onChange={setU('cpu_id')} />
            <Field label="ram_gb"            value={updateVals.ram_gb        || ''} onChange={setU('ram_gb')} />
            <div className="row">
              <label>ram_type</label>
              <select onChange={e => setU('ram_type')(e.target.value)}>
                <option value="">— skip —</option>
                <option>DDR3</option><option>DDR4</option><option>DDR5</option>
              </select>
            </div>
          </div>
          <div>
            <Field label="storage_gb"        value={updateVals.storage_gb    || ''} onChange={setU('storage_gb')} />
            <div className="row">
              <label>storage_type</label>
              <select onChange={e => setU('storage_type')(e.target.value)}>
                <option value="">— skip —</option>
                <option>SSD</option><option>HDD</option><option>NVMe</option><option>None</option>
              </select>
            </div>
            <div className="row">
              <label>computer_type</label>
              <select onChange={e => setU('computer_type')(e.target.value)}>
                <option value="">— skip —</option>
                <option>desktop</option><option>laptop</option>
              </select>
            </div>
            <Field label="equipment_user_id" value={updateVals.equipment_user_id || ''} onChange={setU('equipment_user_id')} />
            <Field label="room_id"           value={updateVals.room_id       || ''} onChange={setU('room_id')} />
            <Field label="mac_address"       value={updateVals.mac_address   || ''} onChange={setU('mac_address')} />
            <Field label="observations"      value={updateVals.observations  || ''} onChange={setU('observations')} />
          </div>
        </div>
        <button onClick={async () => setUpdateRes(await patch(`/computers/${updateId}`, buildUpdate(), token))}>Update</button>
        <Res data={updateRes} />
      </div>

      {/* DELETE */}
      <div className="card">
        <h3>DELETE /computers/:id</h3>
        <Field label="id" value={deleteId} onChange={setDeleteId} />
        <button className="danger" onClick={async () => setDeleteRes(await del(`/computers/${deleteId}`, token))}>Delete</button>
        <Res data={deleteRes} />
      </div>
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────────────────────────
const TABS = [
  'Auth', 'Users', 'Centers', 'Rooms', 'CPUs', 'OS', 'EquipmentUsers', 'Computers'
];

const App = () => {
  const [tab,   setTab]   = useState('Auth');
  const [token, setToken] = useState(() => localStorage.getItem('token') || '');

  const handleToken = t => {
    setToken(t);
    if (t) localStorage.setItem('token', t);
    else   localStorage.removeItem('token');
  };

  const renderTab = () => {
    switch (tab) {
      case 'Auth':          return <AuthSection token={token} onToken={handleToken} />;
      case 'Users':         return <UsersSection token={token} />;
      case 'Centers':       return (
        <CrudSection title="Centers" basePath="/centers" token={token}
          fields={[{ key: 'name' }]} />
      );
      case 'Rooms':         return <RoomsSection token={token} />;
      case 'CPUs':          return (
        <CrudSection title="CPUs" basePath="/cpus" token={token}
          fields={[
            { key: 'model_name', placeholder: 'optional' },
            { key: 'benchmark_score', placeholder: 'integer, optional' },
          ]} />
      );
      case 'OS':            return (
        <CrudSection title="Operating Systems" basePath="/os" token={token}
          fields={[{ key: 'name' }]} />
      );
      case 'EquipmentUsers': return (
        <CrudSection title="Equipment Users" basePath="/equipment-users" token={token}
          fields={[{ key: 'name' }]} />
      );
      case 'Computers':     return <ComputersSection token={token} />;
      default:              return null;
    }
  };

  return (
    <div className="layout">
      <div className="sidebar">
        <div className="sidebar-title">Inventari</div>
        {TABS.map(t => (
          <div key={t} className={`tab${tab === t ? ' active' : ''}`} onClick={() => setTab(t)}>
            {t}
          </div>
        ))}
        <div style={{ flex: 1 }} />
        <div style={{ padding: '10px 14px', fontSize: 11, color: '#444', borderTop: '1px solid #222' }}>
          API: {API_BASE}
        </div>
      </div>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <div className="token-bar">
          <span>Token:</span>
          <span className="token-val">{token || '— not logged in —'}</span>
          {token && <button style={{ padding: '2px 8px', fontSize: 11, marginTop: 0 }} onClick={() => handleToken('')}>clear</button>}
        </div>
        <div className="content">{renderTab()}</div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
