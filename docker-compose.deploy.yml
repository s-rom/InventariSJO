# Docker Compose para despliegue en VM 2 (192.168.1.3 + red del colegio)
# La base de datos ya está desplegada en VM 1 (192.168.1.2:5432)
#
# Caddy gestiona los certificados TLS automáticamente (Let's Encrypt).
# No hay que tocar ningún certificado manualmente — se renuevan solos.
#
# Variables de entorno necesarias en el .env:
#
#   DB_USER          usuario de postgres
#   DB_PASSWORD      contraseña de postgres
#   DB_NAME          nombre de la base de datos
#
#   DOMAIN           dominio público que apunta a esta máquina
#                    Opciones:
#                      - subdominio de tu hosting:  inventari.tu-dominio.com
#                        (añade un registro A en tu DNS apuntando a la IP pública del colegio)
#                      - DuckDNS gratis:             tu-nombre.duckdns.org
#                        (regístrate en duckdns.org, pon tu IP pública y usa ese subdominio)
#
#   ACME_EMAIL       tu email (Let's Encrypt envía avisos de expiración aquí)
#
# Perfil opcional duckdns (solo si la IP del colegio NO es estática):
#   DUCKDNS_SUBDOMAIN   parte antes de .duckdns.org (ej: inventari-colegio)
#   DUCKDNS_TOKEN       token de tu cuenta DuckDNS
#   Arranca con: docker compose --profile duckdns -f docker-compose.deploy.yml up -d

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    expose:
      - "8080"           # Solo accesible internamente desde Caddy
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@192.168.1.2:5432/${DB_NAME}?sslmode=disable
    restart: unless-stopped
    networks:
      - app

  frontend:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"          # Necesario para el challenge HTTP-01 y redirect a HTTPS
      - "443:443"
    volumes:
      - caddy_data:/data      # Certificados Let's Encrypt (persistentes entre reinicios)
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
      - LOCAL_IP=${LOCAL_IP}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app

  # Actualizador de IP para DuckDNS — solo necesario si la IP pública NO es estática.
  # Actívalo con: docker compose --profile duckdns -f docker-compose.deploy.yml up -d
  duckdns-updater:
    image: linuxserver/duckdns:latest
    environment:
      - SUBDOMAINS=${DUCKDNS_SUBDOMAIN}
      - TOKEN=${DUCKDNS_TOKEN}
      - TZ=Europe/Madrid
    restart: unless-stopped
    profiles:
      - duckdns

networks:
  app:
    driver: bridge

volumes:
  caddy_data:      # cert storage - NO borrar, contiene los certificados emitidos
  caddy_config:
