# Docker Compose para despliegue en VM 2 (192.168.1.3 + red del colegio)
# La base de datos ya está desplegada en VM 1 (192.168.1.2:5432)
#
# Requisitos previos en la VM:
#   - Crear el directorio /etc/ssl/inventari/ y colocar:
#       cert.pem   → certificado (cadena completa si hay CA intermedia)
#       key.pem    → clave privada
#   - Para generar un certificado autofirmado:
#       mkdir -p /etc/ssl/inventari
#       openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#         -keyout /etc/ssl/inventari/key.pem \
#         -out  /etc/ssl/inventari/cert.pem \
#         -subj "/CN=inventari.local"
#
# Variables de entorno necesarias (.env o exportadas):
#   DB_USER, DB_PASSWORD, DB_NAME

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    expose:
      - "8080"           # Solo accesible internamente desde nginx
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@192.168.1.2:5432/${DB_NAME}?sslmode=disable
    restart: unless-stopped
    networks:
      - app
    extra_hosts:
      - "host-gateway:host-gateway"

  frontend:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend-app/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/inventari:/etc/ssl/inventari:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    driver: bridge
