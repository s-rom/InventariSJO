version: "2"

sql:
  - engine: "postgresql"
    queries: "internal/db/queries"
    schema: "../init.sql"
    gen:
      go:
        package: "dbsqlc"
        out: "internal/db/sqlc"
        emit_json_tags: true
        sql_package: "pgx/v5"
        overrides:
          - db_type: "json"
            go_type: "encoding/json.RawMessage"
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
